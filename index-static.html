<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taka 消耗量儀表板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 {
            background: linear-gradient(90deg, #00d9ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .period-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .period-btn {
            padding: 12px 24px;
            border: 2px solid #00d9ff;
            background: transparent;
            color: #00d9ff;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .period-btn.active, .period-btn:hover {
            background: #00d9ff;
            color: #1a1a2e;
            box-shadow: 0 0 20px rgba(0,217,255,0.4);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #a855f7;
            box-shadow: 0 10px 40px rgba(168,85,247,0.2);
        }
        .stat-card h3 { color: #888; font-size: 0.85em; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .value { font-size: 2.2em; font-weight: bold; background: linear-gradient(90deg, #00d9ff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-card .sub { color: #666; font-size: 0.85em; margin-top: 5px; }
        .chart-container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chart-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(0,217,255,0.1); color: #00d9ff; font-weight: 600; }
        tr:hover { background: rgba(255,255,255,0.05); }
        .model-tag {
            display: inline-block;
            padding: 5px 12px;
            background: linear-gradient(90deg, #00d9ff, #a855f7);
            color: #1a1a2e;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: 600;
        }
        .loading { text-align: center; padding: 80px; color: #00d9ff; font-size: 1.5em; }
        .refresh-btn {
            background: linear-gradient(90deg, #00d9ff, #a855f7);
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            margin-left: auto;
        }
        .last-updated { color: #666; font-size: 0.85em; margin-top: 15px; }
        .no-data { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                <h1>📊 Taka Token 消耗儀表板</h1>
                <button class="refresh-btn" onclick="loadData()">🔄 重新整理</button>
            </div>
            <p style="color: #aaa; margin-top: 10px;">監控所有 AI 模型的 Token 使用量與成本統計</p>
            <p class="last-updated" id="lastUpdated"></p>
        </div>
        
        <div class="period-selector">
            <button class="period-btn" onclick="setPeriod('today')" data-period="today">今日</button>
            <button class="period-btn" onclick="setPeriod('week')" data-period="week">本週</button>
            <button class="period-btn active" onclick="setPeriod('month')" data-period="month">本月</button>
            <button class="period-btn" onclick="setPeriod('all')" data-period="all">全部</button>
        </div>
        
        <div id="content"><div class="loading">載入中...</div></div>
    </div>

    <script>
        let currentPeriod = 'month';
        
        // 從 localStorage 讀取數據
        function loadData() {
            const stored = localStorage.getItem('takaStats');
            if (stored) {
                const data = JSON.parse(stored);
                renderDashboard(data);
            } else {
                // 沒有數據，顯示歡迎畫面
                showWelcome();
            }
        }
        
        function showWelcome() {
            document.getElementById('content').innerHTML = `
                <div class="chart-container" style="text-align: center; padding: 60px;">
                    <h2 style="color: #00d9ff; margin-bottom: 20px;">🎉 歡迎使用 Taka 儀表板</h2>
                    <p style="color: #888; margin-bottom: 30px;">目前尚無使用數據</p>
                    <p style="color: #666;">請從 OpenClaw 後端發送 token 使用數據到此儀表板</p>
                    <div style="margin-top: 30px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; text-align: left;">
                        <p style="color: #aaa; font-size: 0.9em;">📌 API endpoint:</p>
                        <code style="color: #a855f7;">POST /api/add-usage</code>
                    </div>
                </div>
            `;
        }
        
        function renderDashboard(data) {
            const totalTokens = data.totalUsage?.inputTokens + data.totalUsage?.outputTokens || 0;
            const totalCost = data.totalUsage?.totalCost || 0;
            const totalRequests = Object.values(data.byModel || {}).reduce((sum, m) => sum + (m.count || 0), 0);
            
            document.getElementById('lastUpdated').textContent = `最後更新：${new Date(data.lastUpdated || Date.now()).toLocaleString('zh-TW')}`;
            
            const content = document.getElementById('content');
            
            if (totalTokens === 0) {
                showWelcome();
                return;
            }
            
            content.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>📥 輸入 Tokens</h3>
                        <div class="value">${formatNumber(data.totalUsage?.inputTokens || 0)}</div>
                        <div class="sub">tokens</div>
                    </div>
                    <div class="stat-card">
                        <h3>📤 輸出 Tokens</h3>
                        <div class="value">${formatNumber(data.totalUsage?.outputTokens || 0)}</div>
                        <div class="sub">tokens</div>
                    </div>
                    <div class="stat-card">
                        <h3>💰 總消耗</h3>
                        <div class="value">$${parseFloat(totalCost).toFixed(3)}</div>
                        <div class="sub">USD</div>
                    </div>
                    <div class="stat-card">
                        <h3>📡 請求次數</h3>
                        <div class="value">${formatNumber(totalRequests)}</div>
                        <div class="sub">requests</div>
                    </div>
                </div>
                
                <div class="chart-row">
                    <div class="chart-container">
                        <h3 style="margin-bottom: 20px; color: #00d9ff;">🤖 模型使用量</h3>
                        <canvas id="modelChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <h3 style="margin-bottom: 20px; color: #00d9ff;">🏢 提供商分佈</h3>
                        <canvas id="providerChart"></canvas>
                    </div>
                </div>
                
                <div class="chart-container">
                    <h3 style="margin-bottom: 20px; color: #00d9ff;">📈 每日趨勢</h3>
                    <canvas id="trendChart"></canvas>
                </div>
                
                <div class="chart-container">
                    <h3 style="margin-bottom: 20px; color: #00d9ff;">📋 模型詳細統計</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>模型</th>
                                <th>請求</th>
                                <th>輸入</th>
                                <th>輸出</th>
                                <th>總計</th>
                                <th>成本</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${Object.entries(data.byModel || {}).map(([model, stats]) => `
                                <tr>
                                    <td><span class="model-tag">${model.split('/').pop()}</span></td>
                                    <td>${formatNumber(stats.count)}</td>
                                    <td>${formatNumber(stats.inputTokens)}</td>
                                    <td>${formatNumber(stats.outputTokens)}</td>
                                    <td>${formatNumber(stats.inputTokens + stats.outputTokens)}</td>
                                    <td>$${(stats.cost || 0).toFixed(3)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            
            createCharts(data);
        }
        
        function createCharts(data) {
            // 模型使用量圖表
            const modelCtx = document.getElementById('modelChart');
            if (modelCtx) {
                const sorted = Object.entries(data.byModel || {})
                    .sort((a, b) => (b[1].inputTokens + b[1].outputTokens) - (a[1].inputTokens + a[1].outputTokens))
                    .slice(0, 8);
                
                new Chart(modelCtx, {
                    type: 'bar',
                    data: {
                        labels: sorted.map(([n]) => n.split('/').pop().substring(0, 15)),
                        datasets: [{
                            label: 'Tokens',
                            data: sorted.map(([_, s]) => s.inputTokens + s.outputTokens),
                            backgroundColor: ['#00d9ff', '#a855f7', '#f472b6', '#34d399', '#fbbf24', '#60a5fa', '#f87171', '#818cf8'],
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' } }, x: { grid: { display: false } } }
                    }
                });
            }
            
            // 提供商圖表
            const providerCtx = document.getElementById('providerChart');
            if (providerCtx) {
                new Chart(providerCtx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(data.byProvider || {}),
                        datasets: [{
                            data: Object.values(data.byProvider || {}).map(s => s.inputTokens + s.outputTokens),
                            backgroundColor: ['#00d9ff', '#a855f7', '#f472b6', '#34d399', '#fbbf24', '#60a5fa']
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { position: 'right', labels: { color: '#fff' } } }
                    }
                });
            }
            
            // 趨勢圖表
            const trendCtx = document.getElementById('trendChart');
            if (trendCtx) {
                const sorted = Object.entries(data.byDate || {}).sort();
                new Chart(trendCtx, {
                    type: 'line',
                    data: {
                        labels: sorted.map(([d]) => d.slice(5)),
                        datasets: [{
                            label: 'Tokens',
                            data: sorted.map(([_, s]) => s.inputTokens + s.outputTokens),
                            borderColor: '#00d9ff',
                            backgroundColor: 'rgba(0,217,255,0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' } }, x: { grid: { color: 'rgba(255,255,255,0.05)' } } }
                    }
                });
            }
        }
        
        function formatNumber(num) {
            if (num >= 1000000) return (num/1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num/1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        function setPeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.period === period));
            // 在靜態版本中，這裡可以過濾數據
        }
        
        // 初始化 - 嘗試從 URL 參數加載數據
        const urlParams = new URLSearchParams(window.location.search);
        const dataParam = urlParams.get('data');
        if (dataParam) {
            try {
                const data = JSON.parse(atob(dataParam));
                localStorage.setItem('takaStats', JSON.stringify(data));
            } catch(e) {}
        }
        
        loadData();
    </script>
</body>
</html>
