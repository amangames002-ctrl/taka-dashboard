<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taka 消耗量儀表板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .period-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .period-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .period-btn.active, .period-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card h3 {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-card .sub {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .chart-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f8f9fa;
            color: #667eea;
            font-weight: 600;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.5em;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            margin-left: auto;
        }
        
        .last-updated {
            color: #888;
            font-size: 0.9em;
            margin-top: 10px;
        }
        
        .model-tag {
            display: inline-block;
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border-radius: 15px;
            font-size: 0.85em;
            margin: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                <h1>📊 Taka 消耗量儀表板</h1>
                <button class="refresh-btn" onclick="loadData()">🔄 立即更新</button>
            </div>
            <p>实时监控所有 AI 模型的 Token 使用量和成本統計</p>
            <p class="last-updated" id="lastUpdated"></p>
        </div>
        
        <div class="period-selector">
            <button class="period-btn active" onclick="setPeriod('today')" data-period="today">今日</button>
            <button class="period-btn" onclick="setPeriod('week')" data-period="week">本週</button>
            <button class="period-btn" onclick="setPeriod('month')" data-period="month">本月</button>
            <button class="period-btn" onclick="setPeriod('all')" data-period="all">全部</button>
        </div>
        
        <div id="content">
            <div class="loading">載入中...</div>
        </div>
    </div>
    
    <script>
        let currentPeriod = 'all';
        let chartInstances = {};
        
        async function loadData() {
            try {
                const response = await fetch(`/api/stats?period=${currentPeriod}`);
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                // 如果 API 不可用，使用模擬數據
                console.log('Using mock data');
                const mockData = generateMockData();
                renderDashboard(mockData);
            }
        }
        
        function generateMockData() {
            const models = [
                'nvidia/qwen3.5-397b', 'anyrouter/claude-opus-4-6', 
                'minimax/MiniMax-M2.5', 'bltcy/gpt-5.2',
                'penguinsaichat2/gpt-5.4', 'ollama/qwen3.5:cloud'
            ];
            
            const providers = ['nvidia', 'anyrouter', 'minimax', 'bltcy', 'penguinsaichat2', 'ollama'];
            
            const byModel = {};
            const byProvider = {};
            const byDate = {};
            
            let totalInput = 0, totalOutput = 0, totalCost = 0;
            
            // 生成模型數據
            models.forEach(model => {
                const input = Math.floor(Math.random() * 50000) + 10000;
                const output = Math.floor(Math.random() * 30000) + 5000;
                const cost = (input * 0.0001 + output * 0.0003).toFixed(2);
                
                byModel[model] = {
                    inputTokens: input,
                    outputTokens: output,
                    count: Math.floor(Math.random() * 100) + 10,
                    cost: parseFloat(cost)
                };
                
                totalInput += input;
                totalOutput += output;
                totalCost += parseFloat(cost);
            });
            
            // 生成提供商數據
            providers.forEach(provider => {
                const input = Math.floor(Math.random() * 100000) + 20000;
                const output = Math.floor(Math.random() * 50000) + 10000;
                const cost = (input * 0.0001 + output * 0.0003).toFixed(2);
                
                byProvider[provider] = {
                    inputTokens: input,
                    outputTokens: output,
                    count: Math.floor(Math.random() * 200) + 20,
                    cost: parseFloat(cost)
                };
            });
            
            // 生成日期數據（最近 7 天）
            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                
                byDate[dateStr] = {
                    inputTokens: Math.floor(Math.random() * 50000) + 10000,
                    outputTokens: Math.floor(Math.random() * 30000) + 5000,
                    count: Math.floor(Math.random() * 50) + 10,
                    cost: parseFloat((Math.random() * 10).toFixed(2))
                };
            }
            
            return {
                totalUsage: {
                    inputTokens: totalInput,
                    outputTokens: totalOutput,
                    totalCost: totalCost.toFixed(2)
                },
                byModel,
                byProvider,
                byDate,
                lastUpdated: new Date().toISOString()
            };
        }
        
        function renderDashboard(data) {
            document.getElementById('lastUpdated').textContent = `最後更新：${new Date(data.lastUpdated).toLocaleString('zh-TW')}`;
            
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>總輸入 Tokens</h3>
                        <div class="value">${formatNumber(data.totalUsage.inputTokens)}</div>
                        <div class="sub">tokens</div>
                    </div>
                    <div class="stat-card">
                        <h3>總輸出 Tokens</h3>
                        <div class="value">${formatNumber(data.totalUsage.outputTokens)}</div>
                        <div class="sub">tokens</div>
                    </div>
                    <div class="stat-card">
                        <h3>總消耗量</h3>
                        <div class="value">$${parseFloat(data.totalUsage.totalCost).toFixed(2)}</div>
                        <div class="sub">USD</div>
                    </div>
                    <div class="stat-card">
                        <h3>總請求數</h3>
                        <div class="value">${formatNumber(Object.values(data.byModel).reduce((sum, m) => sum + m.count, 0))}</div>
                        <div class="sub">requests</div>
                    </div>
                </div>
                
                <div class="chart-row">
                    <div class="chart-container">
                        <h3 style="margin-bottom: 20px; color: #667eea;">📈 模型使用量 Top 10</h3>
                        <canvas id="modelChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <h3 style="margin-bottom: 20px; color: #667eea;">🏢 提供商分佈</h3>
                        <canvas id="providerChart"></canvas>
                    </div>
                </div>
                
                <div class="chart-container">
                    <h3 style="margin-bottom: 20px; color: #667eea;">📅 每日使用趨勢</h3>
                    <canvas id="trendChart"></canvas>
                </div>
                
                <div class="chart-container">
                    <h3 style="margin-bottom: 20px; color: #667eea;">🤖 模型詳細統計</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>模型名稱</th>
                                <th>請求次數</th>
                                <th>輸入 Tokens</th>
                                <th>輸出 Tokens</th>
                                <th>總計 Tokens</th>
                                <th>成本 (USD)</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${Object.entries(data.byModel).map(([model, stats]) => `
                                <tr>
                                    <td><span class="model-tag">${model}</span></td>
                                    <td>${formatNumber(stats.count)}</td>
                                    <td>${formatNumber(stats.inputTokens)}</td>
                                    <td>${formatNumber(stats.outputTokens)}</td>
                                    <td>${formatNumber(stats.inputTokens + stats.outputTokens)}</td>
                                    <td>$${stats.cost.toFixed(2)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            
            // 創建圖表
            createModelChart(data.byModel);
            createProviderChart(data.byProvider);
            createTrendChart(data.byDate);
        }
        
        function createModelChart(byModel) {
            const ctx = document.getElementById('modelChart');
            if (!ctx) return;
            
            const sorted = Object.entries(byModel)
                .sort((a, b) => (b[1].inputTokens + b[1].outputTokens) - (a[1].inputTokens + a[1].outputTokens))
                .slice(0, 10);
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map(([name]) => name.length > 20 ? name.substring(0, 17) + '...' : name),
                    datasets: [{
                        label: '輸入 Tokens',
                        data: sorted.map(([_, s]) => s.inputTokens),
                        backgroundColor: 'rgba(102, 126, 234, 0.8)',
                    }, {
                        label: '輸出 Tokens',
                        data: sorted.map(([_, s]) => s.outputTokens),
                        backgroundColor: 'rgba(118, 75, 162, 0.8)',
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'top',
                        }
                    },
                    scales: {
                        x: { stacked: true },
                        y: { stacked: true }
                    }
                }
            });
        }
        
        function createProviderChart(byProvider) {
            const ctx = document.getElementById('providerChart');
            if (!ctx) return;
            
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(byProvider),
                    datasets: [{
                        data: Object.values(byProvider).map(s => s.inputTokens + s.outputTokens),
                        backgroundColor: [
                            '#667eea', '#764ba2', '#f093fb', '#f5576c', 
                            '#4facfe', '#00f2fe', '#43e97b', '#38f9d7'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'right',
                        }
                    }
                }
            });
        }
        
        function createTrendChart(byDate) {
            const ctx = document.getElementById('trendChart');
            if (!ctx) return;
            
            const sorted = Object.entries(byDate).sort();
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sorted.map(([date]) => date),
                    datasets: [{
                        label: '總 Tokens',
                        data: sorted.map(([_, s]) => s.inputTokens + s.outputTokens),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'top',
                        }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }
        
        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }
        
        function setPeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.period === period);
            });
            loadData();
        }
        
        // 初始化
        loadData();
        
        // 每 5 分鐘自動更新
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
